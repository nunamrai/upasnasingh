<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello 💗</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
      body {
        background: linear-gradient(135deg, #ffe4ec, #fff0f5);
        overflow: hidden;
      }
    </style>
  </head>

  <body class="h-screen w-screen flex items-center justify-center font-sans">
    <div class="text-center px-6 opacity-0" id="card">
      <!-- Glow -->
      <div
        class="w-48 h-48 mx-auto rounded-full bg-pink-300 blur-3xl opacity-40"
      ></div>

      <!-- Image -->
      <div
        class="w-28 h-28 mx-auto -mt-32 rounded-full border-4 border-pink-400 overflow-hidden shadow-xl"
      >
        <img
          src="./public/img/profile.jpg"
          class="w-full h-full object-cover"
        />
      </div>

      <!-- Name -->
      <h1
        class="text-4xl md:text-5xl font-extrabold text-pink-600 mt-6 drop-shadow-sm"
      >
        Hello, I'm Upasna 💕
      </h1>

      <!-- Message -->
      <p
        class="text-pink-700 mt-4 max-w-md mx-auto leading-relaxed text-base font-medium"
      >
        Just a small soul living in a big world 🌸 I believe in kindness,
        softness, and spreading love everywhere I go.
      </p>

      <!-- Kindness -->
      <div class="mt-10">
        <p class="text-pink-600 font-bold text-xl">Be kind to animals 🐾</p>
        <p class="text-pink-500 text-sm mt-2">
          They feel love, care, and emotions just like us.
        </p>
      </div>

      <!-- Dots -->
      <div class="mt-10 flex justify-center gap-2">
        <div class="w-2.5 h-2.5 bg-pink-500 rounded-full"></div>
        <div class="w-2.5 h-2.5 bg-pink-400 rounded-full"></div>
        <div class="w-2.5 h-2.5 bg-pink-300 rounded-full"></div>
      </div>
    </div>

    <script>
      gsap.to("#card", {
        opacity: 1,
        y: -10,
        duration: 1.2,
        ease: "power3.out",
      });

      gsap.from("h1", {
        y: 30,
        opacity: 0,
        delay: 0.3,
        duration: 1,
      });

      gsap.from("p", {
        y: 20,
        opacity: 0,
        delay: 0.5,
        duration: 1,
        stagger: 0.2,
      });

      gsap.from(".w-28", {
        scale: 0.5,
        opacity: 0,
        duration: 1,
        ease: "back.out(1.7)",
      });
    </script>
  </body>
</html>
